              - "10"
          score: 50       
    - key: post_secondary_education_in_canada
      clauses:
        - if:
            post_secondary_education_in_canada: "1-2"
          score: 15
        - if:
            post_secondary_education_in_canada: "3+"
          score: 30
    - key: with_pnp
      clauses:
        - if:
            with_pnp: "yes"
          score: 600
